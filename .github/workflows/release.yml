name: Distribute Release

# This workflow is a DISTRIBUTION-ONLY pipeline. The actual Trik_Klip binary
# is built locally on the developer's Windows machine (required for the
# Vulkan-accelerated whisper.cpp bundle, which is not available as a prebuilt
# CI-friendly artifact) and attached to the GitHub release as an asset.
#
# When a release is published, this workflow:
#   1. Downloads the portable zip from the release assets
#   2. Uploads the zip to Cloudflare R2
#   3. POSTs a release manifest to nuldrums.world/api/admin/title-releases
#      (creates a DRAFT release — promote to active manually in the admin UI
#       once you've verified it works)
#
# See RELEASE.md for the full flow and the /deploy skill for the local build
# + release creation steps.

on:
  release:
    types: [published]

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Parse version from tag
        id: version
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip the "v" prefix — tag is vX.X.X, version is X.X.X
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "zip_name=trik-klip_${VERSION}_windows-x86_64.zip" >> $GITHUB_OUTPUT
          echo "Parsed version: $VERSION"

      - name: Download portable zip from release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ steps.version.outputs.zip_name }}" \
            --dir .
          ls -lh "${{ steps.version.outputs.zip_name }}"

      - name: Compute SHA-256 and size
        id: meta
        shell: bash
        run: |
          ZIP="${{ steps.version.outputs.zip_name }}"
          SHA=$(sha256sum "$ZIP" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$ZIP")
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "SHA-256: $SHA"
          echo "Size:    $SIZE bytes"

      - name: Upload zip to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESSKEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp \
            "${{ steps.version.outputs.zip_name }}" \
            "s3://nuldrums-releases/releases/trik-klip/${{ steps.version.outputs.version }}/windows-x86_64.zip" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Register release with website (draft)
        shell: bash
        env:
          TITLE_RELEASE_API_KEY: ${{ secrets.TITLE_RELEASE_API_KEY }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          jq -n \
            --arg title_slug "trik-klip" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg platform "windows-x86_64" \
            --arg archive_key "releases/trik-klip/${{ steps.version.outputs.version }}/windows-x86_64.zip" \
            --arg archive_sha256 "${{ steps.meta.outputs.sha256 }}" \
            --argjson archive_size ${{ steps.meta.outputs.size }} \
            --arg executable_path "trik-klip.exe" \
            --arg release_notes "$RELEASE_NOTES" \
            --argjson set_active false \
            '{title_slug: $title_slug, version: $version, platform: $platform, archive_key: $archive_key, archive_sha256: $archive_sha256, archive_size: $archive_size, executable_path: $executable_path, release_notes: $release_notes, set_active: $set_active}' \
          | curl -f -X POST https://nuldrums.world/api/admin/title-releases \
            -H "Content-Type: application/json" \
            -H "x-api-key: $TITLE_RELEASE_API_KEY" \
            -d @-

      - name: Summary
        shell: bash
        run: |
          echo "::notice::Trik_Klip ${{ steps.version.outputs.version }} uploaded to R2 and registered as DRAFT on nuldrums.world"
          echo "::notice::Promote to active via https://nuldrums.world/admin/titles"
